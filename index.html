<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EkoPass Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #2b2108, #000 45%);
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      min-height: 100vh;
    }

    header {
      padding: 22px 16px;
      border-bottom: 2px solid #D4AF37;
      background: #050505;
    }

    .brand {
      color: #D4AF37;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 5px;
    }

    .event {
      margin-top: 8px;
      font-size: 13px;
      color: #ccc;
    }

    #reader {
      width: 92%;
      max-width: 430px;
      margin: 28px auto 18px;
      border: 2px solid #D4AF37;
      border-radius: 22px;
      overflow: hidden;
      background: #111;
    }

    #result {
      width: 92%;
      max-width: 430px;
      margin: 18px auto;
      padding: 24px 18px;
      border: 1px solid #D4AF37;
      border-radius: 24px;
      background: #111;
      min-height: 170px;
    }

    .waiting { color: #D4AF37; }
    .success { color: #00C853; }
    .used { color: #D4AF37; }
    .error { color: #D50000; }

    .icon { font-size: 52px; margin-bottom: 10px; }
    .title { font-size: 28px; font-weight: 900; margin-bottom: 14px; }
    .name { font-size: 25px; font-weight: 900; margin-bottom: 18px; }
    .details { font-size: 17px; line-height: 1.6; color: #ddd; }

    button {
      margin-top: 18px;
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-weight: 900;
      font-size: 15px;
    }

    .footer {
      margin: 24px 0;
      color: #777;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">EKOPASS</div>
    <div class="event">EKO MI AWARDS 2026 — RECEPTION SCANNER</div>
  </header>

  <div id="reader"></div>

  <div id="result">
    <div class="icon">CAM</div>
    <div class="title waiting">READY TO SCAN</div>
    <div class="details">Point the camera at a guest invitation QR code.</div>
  </div>

  <div class="footer">POWERED BY EKOPASS</div>

  <script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyj7Xvp6DeqNVkLcQa-VDq843MS8zsZUOCg4T1bLIufD5cH3chbfxxEKUVJio33E8GG/exec";

    let scanner;
    let isProcessing = false;
    let countdownTimer;

    function startScanner() {
      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 260, height: 260 } },
        onScanSuccess
      ).catch(err => {
        showError("CAMERA ERROR", err);
      });
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      showLoading();

      const token = extractToken(decodedText);
      const callbackName = "ekopassCallback_" + Date.now();

      window[callbackName] = function(response) {
        showResult(response);
        delete window[callbackName];
        script.remove();
      };

      const script = document.createElement("script");
      script.src = BACKEND_URL + "?api=checkin&token=" + encodeURIComponent(token) + "&callback=" + callbackName;
      document.body.appendChild(script);
    }

    function extractToken(text) {
      try {
        const url = new URL(text);
        return url.searchParams.get("token") || text;
      } catch (e) {
        return text;
      }
    }

    function showLoading() {
      document.getElementById("result").innerHTML = `
        <div class="icon">...</div>
        <div class="title waiting">CHECKING GUEST...</div>
        <div class="details">Please wait.</div>
      `;
    }

    function showResult(response) {
      const icon =
        response.statusType === "success" ? "OK" :
        response.statusType === "used" ? "USED" : "NO";

      let seconds = 5;

      document.getElementById("result").innerHTML = `
        <div class="icon">${icon}</div>
        <div class="title ${response.statusType}">${response.title}</div>
        <div class="name">${response.name || ""}</div>
        <div class="details">
          ${response.category ? "Category: " + response.category + "<br>" : ""}
          ${response.table ? "Table: " + response.table + "<br>" : ""}
          ${response.message || ""}
          <br><br>
          Returning to scanner in <strong id="countdown">5</strong> seconds
        </div>
        <button onclick="resetScanner()">SCAN NEXT NOW</button>
      `;

      countdownTimer = setInterval(() => {
        seconds--;
        const countdown = document.getElementById("countdown");
        if (countdown) countdown.textContent = seconds;

        if (seconds <= 0) {
          resetScanner();
        }
      }, 1000);
    }

    function showError(title, message) {
      document.getElementById("result").innerHTML = `
        <div class="icon">NO</div>
        <div class="title error">${title}</div>
        <div class="details">${message}</div>
      `;
    }

    function resetScanner() {
      clearInterval(countdownTimer);
      isProcessing = false;

      document.getElementById("result").innerHTML = `
        <div class="icon">CAM</div>
        <div class="title waiting">READY TO SCAN</div>
        <div class="details">Point the camera at the next guest invitation QR code.</div>
      `;
    }

    startScanner();
  </script>
</body>
</html>
